<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NanoAgent</title>
    <script>
      (function () {
        try {
          var mode = localStorage.getItem("nano-agent-theme") || "system";
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = mode === "system" ? (prefersDark ? "dark" : "light") : mode;
          document.documentElement.dataset.theme = theme;
          document.documentElement.dataset.themeMode = mode;
        } catch (_) {
          document.documentElement.dataset.theme = "dark";
          document.documentElement.dataset.themeMode = "system";
        }
      })();
    </script>
    <style>
      :root {
        color-scheme: dark;
        --startup-bg: #070b12;
        --startup-panel: #111827;
        --startup-text: #e5edf7;
        --startup-muted: #7f8ba3;
        --startup-line: rgba(125, 211, 252, 0.34);
        --startup-accent: #20d3c2;
        --startup-accent-2: #7dd3fc;
      }

      :root[data-theme="light"] {
        color-scheme: light;
        --startup-bg: #f3f7fb;
        --startup-panel: #ffffff;
        --startup-text: #172033;
        --startup-muted: #61708a;
        --startup-line: rgba(14, 165, 233, 0.24);
        --startup-accent: #0f9f8f;
        --startup-accent-2: #0284c7;
      }

      html,
      body,
      #root {
        margin: 0;
        min-width: 960px;
        min-height: 100%;
        background:
          radial-gradient(circle at 22px 18px, color-mix(in srgb, var(--startup-accent-2) 12%, transparent), transparent 30%),
          var(--startup-bg);
      }

      body {
        overflow: hidden;
      }

      #nano-startup {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 30% 22%, color-mix(in srgb, var(--startup-accent-2) 16%, transparent), transparent 30%),
          linear-gradient(180deg, color-mix(in srgb, var(--startup-panel) 16%, transparent), transparent 44%),
          var(--startup-bg);
        color: var(--startup-text);
        transition: opacity 260ms ease, visibility 260ms ease;
      }

      #nano-startup.nano-startup--hide {
        opacity: 0;
        visibility: hidden;
      }

      .nano-startup-card {
        display: grid;
        justify-items: center;
        gap: 18px;
        min-width: 260px;
        padding: 28px 30px;
        text-align: center;
      }

      .nano-startup-mark {
        position: relative;
        width: 58px;
        height: 58px;
        border: 1px solid var(--startup-line);
        border-radius: 8px;
        background:
          linear-gradient(135deg, color-mix(in srgb, var(--startup-accent) 14%, transparent), transparent 54%),
          color-mix(in srgb, var(--startup-panel) 82%, transparent);
        box-shadow: 0 20px 48px color-mix(in srgb, var(--startup-accent-2) 14%, transparent);
        overflow: hidden;
      }

      .nano-startup-mark::before,
      .nano-startup-mark::after {
        content: "";
        position: absolute;
        inset: 12px;
        border: 1px solid color-mix(in srgb, var(--startup-accent-2) 54%, transparent);
        border-radius: 5px;
      }

      .nano-startup-mark::after {
        inset: auto 12px 12px auto;
        width: 18px;
        height: 18px;
        border-color: var(--startup-accent);
        animation: nano-startup-pulse 1.2s ease-in-out infinite;
      }

      .nano-startup-title {
        display: grid;
        justify-items: center;
        gap: 4px;
      }

      .nano-startup-title strong {
        font: 600 18px/1.2 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      .nano-startup-title span {
        color: var(--startup-muted);
        font: 500 12px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .nano-startup-bar {
        width: 172px;
        height: 2px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--startup-line) 48%, transparent);
        overflow: hidden;
      }

      .nano-startup-bar::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--startup-accent), var(--startup-accent-2));
        animation: nano-startup-scan 1.35s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }

      @keyframes nano-startup-scan {
        from { transform: translateX(-110%); }
        to { transform: translateX(250%); }
      }

      @keyframes nano-startup-pulse {
        0%, 100% { opacity: 0.45; transform: scale(0.86); }
        50% { opacity: 1; transform: scale(1); }
      }

      @media (prefers-reduced-motion: reduce) {
        .nano-startup-mark::after,
        .nano-startup-bar::before {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="nano-startup" aria-hidden="true">
      <div class="nano-startup-card">
        <div class="nano-startup-mark"></div>
        <div class="nano-startup-title">
          <strong>NanoAgent</strong>
          <span>正在打开本地工作台</span>
        </div>
        <div class="nano-startup-bar"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
